<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nyaru Soundboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   🌌 基本設定
========================= */

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  color: white;
  overflow-x: hidden;
  background: black;
}

/* =========================
   🌌 幻燈片背景
========================= */

.bg-slideshow {
  position: fixed;
  inset: 0;
  z-index: -3;
  overflow: hidden;
}

/* 背景圖片 */
.bg-slide {
  position: absolute;
  inset: 0;

  background-size: cover;
  background-position: center;

  opacity: 0;

  transition:
    opacity 2.5s ease-in-out;

  transform: scale(1.05);

  animation:
    floatingBg 18s ease-in-out infinite;

  /* 🔥 模糊 */
  filter: blur(3px);
}

/* 顯示中的背景 */
.bg-slide.active {
  opacity: 1;
}

/* 漂浮動畫 */
@keyframes floatingBg {

  0% {
    transform:
      scale(1.05)
      translateY(0px);
  }

  50% {
    transform:
      scale(1.1)
      translateY(-10px);
  }

  100% {
    transform:
      scale(1.05)
      translateY(0px);
  }
}

/* =========================
   🌑 深色透明遮罩
========================= */

.bg-overlay {
  position: fixed;
  inset: 0;
  z-index: -2;

  /* 🔥 提高透明度 */
  background:
    linear-gradient(
      rgba(10, 15, 25, 0.72),
      rgba(10, 15, 25, 0.82)
    );
}

/* =========================
   ✨ 漂浮粒子
========================= */

.particles {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: -1;
  pointer-events: none;
}

.particle {
  position: absolute;
  bottom: -20px;

  width: 6px;
  height: 6px;

  background:
    rgba(255,255,255,0.35);

  border-radius: 50%;

  animation:
    floatUp linear infinite;
}

@keyframes floatUp {

  from {
    transform: translateY(0);
    opacity: 0;
  }

  10% {
    opacity: 1;
  }

  to {
    transform: translateY(-120vh);
    opacity: 0;
  }
}

/* =========================
   🎀 Header
========================= */

.topbar {

  margin: 14px;

  padding: 16px 20px;

  background:
    rgba(255,255,255,0.12);

  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border:
    1px solid rgba(255,255,255,0.18);

  border-radius: 24px;

  box-shadow:
    0 8px 32px rgba(0,0,0,0.25);

  position: sticky;
  top: 10px;
  z-index: 20;
}

/* 頂部排列 */
.topbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* 標題 */
.topbar h1 {

  margin: 0;

  font-size: 30px;
  font-weight: 700;

  display: flex;
  align-items: center;
  gap: 10px;

  text-shadow:
    0 0 12px rgba(255,255,255,0.4);
}

.title-icon {
  font-size: 34px;
}

/* =========================
   🌐 社群按鈕
========================= */

.social-bar {
  display: flex;
  gap: 14px;
}

.social-bar a {

  width: 42px;
  height: 42px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;

  color: white;
  font-size: 18px;

  background:
    rgba(255,255,255,0.08);

  transition: all 0.25s ease;
}

.social-bar a:hover {

  transform:
    translateY(-3px)
    scale(1.08);

  background:
    rgba(255,255,255,0.18);

  box-shadow:
    0 0 16px rgba(255,255,255,0.3);
}

/* =========================
   🔍 搜尋欄
========================= */

.search-box {
  margin-top: 14px;
}

.search-box input {

  width: 100%;

  padding: 14px 18px;

  border: none;
  outline: none;

  border-radius: 999px;

  background:
    rgba(255,255,255,0.15);

  backdrop-filter: blur(10px);

  color: white;
  font-size: 15px;

  box-sizing: border-box;

  transition: 0.25s;
}

.search-box input::placeholder {
  color: rgba(255,255,255,0.7);
}

.search-box input:focus {

  background:
    rgba(255,255,255,0.22);

  box-shadow:
    0 0 0 3px rgba(255,255,255,0.15);
}

/* =========================
   🎵 音效區
========================= */

.grid {

  padding: 18px;

  display: grid;

  grid-template-columns:
    repeat(auto-fill, minmax(140px, 1fr));

  gap: 18px;
}

/* 音效按鈕 */
.sound-btn {

  position: relative;

  border:
    1px solid rgba(255,255,255,0.15);

  background:
    rgba(255,255,255,0.12);

  backdrop-filter: blur(14px);

  color: white;

  padding: 20px 12px;

  border-radius: 20px;

  cursor: pointer;

  overflow: hidden;

  transition: all 0.28s ease;

  box-shadow:
    0 8px 20px rgba(0,0,0,0.2);

  font-size: 14px;
}

/* 光澤效果 */
.sound-btn::before {

  content: "";

  position: absolute;

  top: 0;
  left: -120%;

  width: 80%;
  height: 100%;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,0.25),
      transparent
    );

  transition: 0.6s;
}

.sound-btn:hover::before {
  left: 130%;
}

/* Hover */
.sound-btn:hover {

  transform:
    translateY(-5px)
    scale(1.03);

  background:
    rgba(255,255,255,0.18);

  box-shadow:
    0 14px 28px rgba(0,0,0,0.28);
}

.sound-btn:active {
  transform: scale(0.95);
}

/* 裝飾星星 */
.sound-btn::after {

  content: "✦";

  position: absolute;

  top: 8px;
  right: 10px;

  font-size: 11px;

  opacity: 0.6;
}

/* =========================
   📱 手機版
========================= */

@media (max-width: 600px) {

  .topbar {
    margin: 10px;
    padding: 14px;
  }

  .topbar h1 {
    font-size: 22px;
  }

  .title-icon {
    font-size: 24px;
  }

  .grid {

    grid-template-columns:
      repeat(auto-fill, minmax(110px, 1fr));
  }

  .sound-btn {
    padding: 16px 10px;
    font-size: 12px;
  }
}

</style>
</head>

<body>

<!-- =========================
     🌌 背景幻燈片
========================= -->

<div class="bg-slideshow">

  <!-- 🔥 放入你的圖片 -->
  <div class="bg-slide active"
  style="background-image:url('images/吐舌WINK.png')">
  </div>

</div>

<!-- 🌑 深色遮罩 -->
<div class="bg-overlay"></div>

<!-- ✨ 漂浮粒子 -->
<div class="particles" id="particles"></div>

<!-- =========================
     🎀 Header
========================= -->

<header class="topbar">

  <div class="topbar-row">

    <h1>
      <span class="title-icon">🎧</span>
      Nyaru Soundboard
    </h1>

    <div class="social-bar">

      <a href="https://www.youtube.com/@Nyaru_NeSh1"
      target="_blank">
        <i class="fab fa-youtube"></i>
      </a>

      <a href="https://x.com/Nyaru_nesh1"
      target="_blank">
        <i class="fab fa-x-twitter"></i>
      </a>

      <a href="https://www.twitch.tv/nyaru_nesh1"
      target="_blank">
        <i class="fab fa-twitch"></i>
      </a>

    </div>
  </div>

  <!-- 🔍 搜尋欄 -->
  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="搜尋音效..."
    >

  </div>

</header>

<!-- =========================
     🎵 音效區
========================= -->

<main>
  <div id="soundGrid" class="grid"></div>
</main>

<script>

/* =========================
   🎵 音效資料
========================= */

const soundData = [

  {
    name: "歐買嘎都",
    file: "sounds/歐買嘎都.mp3"
  },

  {
    name: "蛤",
    file: "sounds/huh.mp3"
  },

  {
    name: "笑聲",
    file: "sounds/laugh.mp3"
  }

];

/* =========================
   🎵 Render
========================= */

const grid =
document.getElementById("soundGrid");

const searchInput =
document.getElementById("searchInput");

function renderSounds(filter = "") {

  grid.innerHTML = "";

  const filtered =
  soundData.filter(s =>
    s.name
    .toLowerCase()
    .includes(filter.toLowerCase())
  );

  filtered.forEach(sound => {

    const btn =
    document.createElement("button");

    btn.className = "sound-btn";

    btn.textContent = sound.name;

    btn.onclick = () => {

      const audio =
      new Audio(sound.file);

      audio.play();
    };

    grid.appendChild(btn);
  });
}

searchInput.addEventListener(
  "input",
  e => {
    renderSounds(e.target.value);
  }
);

renderSounds();

/* =========================
   ✨ 漂浮粒子
========================= */

const particleContainer =
document.getElementById("particles");

for(let i = 0; i < 35; i++) {

  const particle =
  document.createElement("div");

  particle.className = "particle";

  particle.style.left =
    Math.random() * 100 + "%";

  particle.style.animationDuration =
    (8 + Math.random() * 10) + "s";

  particle.style.animationDelay =
    Math.random() * 10 + "s";

  particle.style.opacity =
    Math.random();

  particle.style.width =
    particle.style.height =
    (4 + Math.random() * 8) + "px";

  particleContainer.appendChild(particle);
}

</script>

</body>
</html>
