<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nyaru Soundboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================================
   рҹҢҢ еҹәжң¬иЁӯе®ҡ
========================================= */

*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  color:white;
  overflow-x:hidden;
  background:black;
}

/* =========================================
   вңЁ ж»‘йј е…үжҡҲ
========================================= */

.cursor-glow{

  position:fixed;

  width:380px;
  height:380px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,0.14) 0%,
      rgba(255,255,255,0.06) 30%,
      transparent 70%
    );

  pointer-events:none;

  z-index:-1;

  transform:
    translate(-50%, -50%);

  transition:
    transform .08s linear;

  mix-blend-mode:screen;
}

/* =========================================
   рҹҢҢ иғҢжҷҜе№»зҮҲзүҮ
========================================= */

.bg-slideshow{
  position:fixed;
  inset:0;
  z-index:-4;
  overflow:hidden;
}

.bg-slide{

  position:absolute;
  inset:0;

  background-size:cover;
  background-repeat:no-repeat;
  background-position:center center;

  opacity:0;

  transform:scale(1);

  transition:
    opacity 2s ease;

  filter:
    brightness(.9)
    blur(.5px);

  will-change:
    transform,
    opacity;
}

.bg-slide.active{

  opacity:1;

  animation:
    kenburns 18s ease-in-out forwards;
}

/* Ken Burns */

@keyframes kenburns{

  0%{
    transform:
      scale(1)
      translate3d(0,0,0);
  }

  25%{
    transform:
      scale(1.05)
      translate3d(-1%,-1%,0);
  }

  50%{
    transform:
      scale(1.08)
      translate3d(1%,-2%,0);
  }

  75%{
    transform:
      scale(1.12)
      translate3d(-1%,1%,0);
  }

  100%{
    transform:
      scale(1.15)
      translate3d(1%,0%,0);
  }
}

/* =========================================
   рҹҢ‘ ж·ұиүІйҒ®зҪ©
========================================= */

.bg-overlay{

  position:fixed;
  inset:0;
  z-index:-3;

  background:
    linear-gradient(
      rgba(8,12,20,.68),
      rgba(8,12,20,.84)
    );
}

/* =========================================
   вңЁ зІ’еӯҗ
========================================= */

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-2;
  pointer-events:none;
}

.particle{

  position:absolute;
  bottom:-20px;

  width:6px;
  height:6px;

  background:
    rgba(255,255,255,.35);

  border-radius:50%;

  animation:
    floatUp linear infinite;
}

@keyframes floatUp{

  from{
    transform:translateY(0);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  to{
    transform:translateY(-120vh);
    opacity:0;
  }
}

/* =========================================
   рҹҺҖ Header
========================================= */

.topbar{

  position:sticky;
  top:12px;
  z-index:50;

  margin:14px;

  padding:18px 20px;

  border-radius:28px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.16),
      rgba(255,255,255,.08)
    );

  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);

  border:
    1px solid rgba(255,255,255,.18);

  box-shadow:
    0 8px 40px rgba(0,0,0,.25),
    inset 0 1px 1px rgba(255,255,255,.08);
}

/* еӢ•ж…ӢзҺ»з’ғе…үжҫӨ */

.topbar::before{

  content:"";

  position:absolute;
  inset:0;

  border-radius:inherit;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,.08),
      transparent
    );

  animation:
    glassMove 8s linear infinite;
}

@keyframes glassMove{

  from{
    transform:translateX(-100%);
  }

  to{
    transform:translateX(100%);
  }
}

.topbar-row{

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
}

.topbar h1{

  margin:0;

  display:flex;
  align-items:center;
  gap:10px;

  font-size:30px;
  font-weight:700;

  text-shadow:
    0 0 12px rgba(255,255,255,.35);
}

.title-icon{
  font-size:34px;
}

/* =========================================
   рҹҢҗ зӨҫзҫӨ
========================================= */

.social-bar{
  display:flex;
  gap:14px;
}

.social-bar a{

  width:42px;
  height:42px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;

  color:white;
  text-decoration:none;

  background:
    rgba(255,255,255,.08);

  border:
    1px solid rgba(255,255,255,.12);

  transition:.25s;
}

.social-bar a:hover{

  transform:
    translateY(-4px)
    scale(1.08);

  background:
    rgba(255,255,255,.18);

  box-shadow:
    0 0 18px rgba(255,255,255,.24);
}

/* =========================================
   рҹ”Қ жҗңе°Ӣж¬„
========================================= */

.search-box{
  margin-top:14px;
}

.search-box input{

  width:100%;

  padding:14px 18px;

  border:none;
  outline:none;

  border-radius:999px;

  color:white;
  font-size:15px;

  background:
    rgba(255,255,255,.14);

  border:
    1px solid rgba(255,255,255,.12);

  backdrop-filter:blur(12px);

  transition:.25s;
}

.search-box input::placeholder{
  color:rgba(255,255,255,.7);
}

.search-box input:focus{

  background:
    rgba(255,255,255,.2);

  box-shadow:
    0 0 0 3px rgba(255,255,255,.12);
}

/* =========================================
   рҹҺө Grid
========================================= */

.grid{

  padding:18px;

  display:grid;

  grid-template-columns:
    repeat(auto-fill,minmax(140px,1fr));

  gap:14px;
}

/* =========================================
   рҹҺө Sound Card
========================================= */

.sound-btn{

  position:relative;

  overflow:hidden;

  border:1px solid rgba(255,255,255,0.15);

  backdrop-filter: blur(14px);
   
  border-radius:22px;

  padding:20px 12px;

  color:white;
   
  font-size: 14px;

  cursor:pointer;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.18),
      rgba(255,255,255,.08)
    );

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    background .25s ease;

  box-shadow:
    0 12px 28px rgba(0,0,0,.22),
    inset 0 1px 1px rgba(255,255,255,.08);
}

/* еӢ•ж…ӢзҺ»з’ғе…ү */

.sound-btn::before{

  content:"";

  position:absolute;

  top:0;
  left:-120%;

  width:80%;
  height:100%;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,.22),
      transparent
    );

  transition:.7s;
}

.sound-btn:hover::before{
  left:130%;
}

.sound-btn:hover{

  transform:
    translateY(-6px)
    scale(1.02);

  background:
    rgba(255,255,255,.18);

  box-shadow:
    0 18px 38px rgba(0,0,0,.28);
}

.sound-btn:active{
  transform:scale(.97);
}

/* еҗҚзЁұ */

.sound-name{

  font-size:13px;
  font-weight:600;

  line-height:1.4;
}

/* =========================================
   рҹ“ұ жүӢж©ҹзүҲ
========================================= */

@media(max-width:700px){

  .topbar{
    margin:10px;
    padding:14px;
    border-radius:22px;
  }

  .topbar h1{
    font-size:22px;
  }

  .title-icon{
    font-size:24px;
  }

  .social-bar{
    gap:10px;
  }

  .social-bar a{
    width:38px;
    height:38px;
  }

  .grid{

    padding:14px;

    grid-template-columns:
      repeat(2,1fr);

    gap:14px;
  }

  .sound-btn{

    min-height:82px;

    border-radius:18px;

    padding:12px;
  }

  .sound-name{
    font-size:13px;
  }

  .cursor-glow{
    display:none;
  }
}

</style>
</head>

<body>

<!-- вңЁ ж»‘йј е…үжҡҲ -->
<div class="cursor-glow" id="cursorGlow"></div>

<!-- рҹҢҢ иғҢжҷҜ -->
<div class="bg-slideshow" id="slideshow"></div>

<!-- рҹҢ‘ йҒ®зҪ© -->
<div class="bg-overlay"></div>

<!-- вңЁ зІ’еӯҗ -->
<div class="particles" id="particles"></div>

<!-- =========================================
     рҹҺҖ Header
========================================= -->

<header class="topbar">

  <div class="topbar-row">

    <h1>
      <span class="title-icon">рҹҺ§</span>
      Nyaru Soundboard
    </h1>

    <div class="social-bar">

      <a href="https://www.youtube.com/@Nyaru_NeSh1"
      target="_blank">
        <i class="fab fa-youtube"></i>
      </a>

      <a href="https://x.com/Nyaru_nesh1"
      target="_blank">
        <i class="fab fa-x-twitter"></i>
      </a>

      <a href="https://www.twitch.tv/nyaru_nesh1"
      target="_blank">
        <i class="fab fa-twitch"></i>
      </a>

    </div>

  </div>

  <!-- жҗңе°Ӣ -->

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="жҗңе°Ӣйҹіж•Ҳ..."
    >

  </div>

</header>

<!-- =========================================
     рҹҺө йҹіж•ҲеҚҖ
========================================= -->

<main>
  <div id="soundGrid" class="grid"></div>
</main>

<script>

/* =========================================
   рҹҢҢ иғҢжҷҜиіҮж–ҷ
========================================= */

const bgImages = [

  {
    url:"images/casnyaru.png",
    position:"center center"
  },

  {
    url:"images/WINK.png",
    position:"center top"
  },

  {
    url:"images/1.jpg",
    position:"center center"
  },

  {
    url:"images/2.png",
    position:"50% 20%"
  },

  {
    url:"images/3.png",
    position:"center center"
  },

  {
    url:"images/4.png",
    position:"center center"
  },

  {
    url:"images/5.png",
    position:"center center"
  },

  {
    url:"images/6.png",
    position:"center center"
  },

  {
    url:"images/7.png",
    position:"center center"
  },

  {
    url:"images/8.png",
    position:"center center"
  },

  {
    url:"images/9.png",
    position:"center center"
  },

  {
    url:"images/10.jpg",
    position:"center center"
  },

  {
    url:"images/11.jpg",
    position:"center center"
  },

  {
    url:"images/12.jpg",
    position:"center center"
  },

  {
    url:"images/13.jpg",
    position:"center center"
  },

  {
    url:"images/14.jpg",
    position:"center center"
  },

  {
    url:"images/oHo.jpg",
    position:"center top"
  },

  {
    url:"images/IMG_7064.png",
    position:"center center"
  },

  {
    url:"images/IMG_7461.png",
    position:"center center"
  },

  {
    url:"images/special1.png",
    position:"center center"
  }

];

/* =========================================
   рҹҢҢ е»әз«ӢиғҢжҷҜ
========================================= */

const slideshow =
document.getElementById("slideshow");

bgImages.forEach((img,index)=>{

  const div =
  document.createElement("div");

  div.className = "bg-slide";

  if(index === 0){
    div.classList.add("active");
  }

  div.style.backgroundImage =
  `url('${img.url}')`;

  div.style.backgroundPosition =
  img.position;

  slideshow.appendChild(div);
});

/* =========================================
   рҹҺө йҹіж•ҲиіҮж–ҷ
========================================= */

const soundData = [

  {
    name:"жӯҗиІ·еҳҺйғҪ",
    file:"sounds/жӯҗиІ·еҳҺйғҪ.mp3"
  },

  {
    name:"е–қг„Ӣг„ҹг„Ӣг„ҹ",
    file:"sounds/жқҜжқҜ - е–қг„Ӣг„ҹг„Ӣг„ҹ.mp3"
  },

  {
    name:"wake up е“„зқЎзүҲ",
    file:"sounds/wake up boy - е“„зқЎзүҲжң¬.mp3"
  }
];

/* =========================================
   рҹҺө Render
========================================= */

const grid =
document.getElementById("soundGrid");

const searchInput =
document.getElementById("searchInput");

function renderSounds(filter = ""){

  grid.innerHTML = "";

  const filtered =
  soundData.filter(sound => {

    return sound.name
    .toLowerCase()
    .includes(filter.toLowerCase());
  });

  filtered.forEach(sound=>{

    const btn =
    document.createElement("button");

    btn.className = "sound-btn";

    btn.innerHTML = `

      <div class="sound-name">
        ${sound.name}
      </div>

    `;

    btn.addEventListener("click",()=>{

      const audio =
      new Audio(sound.file);

      audio.volume = 1;

      audio.play();
    });

    grid.appendChild(btn);
  });
}

renderSounds();

/* =========================================
   рҹ”Қ жҗңе°Ӣ
========================================= */

searchInput.addEventListener(
  "input",
  e=>{
    renderSounds(e.target.value);
  }
);

/* =========================================
   рҹҢҢ иғҢжҷҜеҲҮжҸӣ
========================================= */

const slides =
document.querySelectorAll(".bg-slide");

let currentSlide = 0;

function changeSlide(){

  slides[currentSlide]
  .classList.remove("active");

  currentSlide =
  (currentSlide + 1)
  % slides.length;

  slides[currentSlide]
  .classList.add("active");

  const nextTime =
    Math.floor(
      Math.random() * 5000
    ) + 5000;

  setTimeout(changeSlide,nextTime);
}

setTimeout(changeSlide,6000);

/* =========================================
   вңЁ зІ’еӯҗ
========================================= */

const particleContainer =
document.getElementById("particles");

for(let i = 0; i < 35; i++){

  const particle =
  document.createElement("div");

  particle.className = "particle";

  particle.style.left =
    Math.random() * 100 + "%";

  particle.style.animationDuration =
    (8 + Math.random() * 10) + "s";

  particle.style.animationDelay =
    Math.random() * 10 + "s";

  particle.style.opacity =
    Math.random();

  particle.style.width =
    particle.style.height =
    (4 + Math.random() * 8) + "px";

  particleContainer.appendChild(particle);
}

/* =========================================
   вңЁ ж»‘йј е…үжҡҲ
========================================= */

const glow =
document.getElementById("cursorGlow");

document.addEventListener(
  "mousemove",
  e=>{

    glow.style.left =
    e.clientX + "px";

    glow.style.top =
    e.clientY + "px";
  }
);

</script>

</body>
</html>
