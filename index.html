<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nyaru Soundboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================================
   🌌 基本設定
========================================= */

*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  color:white;
  overflow-x:hidden;
  background:black;
}

/* =========================================
   ✨ 滑鼠光暈
========================================= */

.cursor-glow{

  position:fixed;

  width:380px;
  height:380px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,0.14) 0%,
      rgba(255,255,255,0.06) 30%,
      transparent 70%
    );

  pointer-events:none;

  z-index:-1;

  transform:
    translate(-50%, -50%);

  transition:
    transform .08s linear;

  mix-blend-mode:screen;
}

/* =========================================
   🌌 背景幻燈片
========================================= */

.bg-slideshow{
  position:fixed;
  inset:0;
  z-index:-4;
  overflow:hidden;
}

.bg-slide{

  position:absolute;
  inset:0;

  background-size:cover;
  background-repeat:no-repeat;
  background-position:center center;

  opacity:0;

  transform:scale(1);

  transition:
    opacity 2s ease;

  filter:
    brightness(.9)
    blur(.5px);

  will-change:
    transform,
    opacity;
}

.bg-slide.active{

  opacity:1;

  animation:
    kenburns 18s ease-in-out forwards;
}

/* Ken Burns */

@keyframes kenburns{

  0%{
    transform:
      scale(1)
      translate3d(0,0,0);
  }

  25%{
    transform:
      scale(1.05)
      translate3d(-1%,-1%,0);
  }

  50%{
    transform:
      scale(1.08)
      translate3d(1%,-2%,0);
  }

  75%{
    transform:
      scale(1.12)
      translate3d(-1%,1%,0);
  }

  100%{
    transform:
      scale(1.15)
      translate3d(1%,0%,0);
  }
}

/* =========================================
   🌑 深色遮罩
========================================= */

.bg-overlay{

  position:fixed;
  inset:0;
  z-index:-3;

  background:
    linear-gradient(
      rgba(8,12,20,.68),
      rgba(8,12,20,.84)
    );
}

/* =========================================
   ✨ 粒子
========================================= */

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-2;
  pointer-events:none;
}

.particle{

  position:absolute;
  bottom:-20px;

  width:6px;
  height:6px;

  background:
    rgba(255,255,255,.35);

  border-radius:50%;

  animation:
    floatUp linear infinite;
}

@keyframes floatUp{

  from{
    transform:translateY(0);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  to{
    transform:translateY(-120vh);
    opacity:0;
  }
}

/* =========================================
   🎀 Header
========================================= */

.topbar{

  position:sticky;
  top:12px;
  z-index:50;

  margin:14px;

  padding:18px 20px;

  border-radius:28px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.16),
      rgba(255,255,255,.08)
    );

  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);

  border:
    1px solid rgba(255,255,255,.18);

  box-shadow:
    0 8px 40px rgba(0,0,0,.25),
    inset 0 1px 1px rgba(255,255,255,.08);
}

/* 動態玻璃光澤 */

.topbar::before{

  content:"";

  position:absolute;
  inset:0;

  border-radius:inherit;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,.08),
      transparent
    );

  animation:
    glassMove 8s linear infinite;
}

@keyframes glassMove{

  from{
    transform:translateX(-100%);
  }

  to{
    transform:translateX(100%);
  }
}

.topbar-row{

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
}

.topbar h1{

  margin:0;

  display:flex;
  align-items:center;
  gap:10px;

  font-size:30px;
  font-weight:700;

  text-shadow:
    0 0 12px rgba(255,255,255,.35);
}

.title-icon{
  font-size:34px;
}

/* =========================================
   🌐 社群
========================================= */

.social-bar{
  display:flex;
  gap:14px;
}

.social-bar a{

  width:42px;
  height:42px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;

  color:white;
  text-decoration:none;

  background:
    rgba(255,255,255,.08);

  border:
    1px solid rgba(255,255,255,.12);

  transition:.25s;
}

.social-bar a:hover{

  transform:
    translateY(-4px)
    scale(1.08);

  background:
    rgba(255,255,255,.18);

  box-shadow:
    0 0 18px rgba(255,255,255,.24);
}

/* =========================================
   🔍 搜尋欄
========================================= */

.search-box{
  margin-top:16px;
}

.search-box input{

  width:100%;

  padding:15px 18px;

  border:none;
  outline:none;

  border-radius:999px;

  color:white;
  font-size:15px;

  background:
    rgba(255,255,255,.14);

  border:
    1px solid rgba(255,255,255,.12);

  backdrop-filter:blur(12px);

  transition:.25s;
}

.search-box input::placeholder{
  color:rgba(255,255,255,.7);
}

.search-box input:focus{

  background:
    rgba(255,255,255,.2);

  box-shadow:
    0 0 0 3px rgba(255,255,255,.12);
}

/* =========================================
   📂 分類列
========================================= */

.category-bar{

  display:flex;
  gap:12px;

  overflow-x:auto;

  padding:
    4px 2px 2px;

  margin-top:16px;
}

.category-bar::-webkit-scrollbar{
  display:none;
}

.category-btn{

  border:none;

  padding:
    10px 16px;

  border-radius:999px;

  color:white;

  cursor:pointer;

  white-space:nowrap;

  background:
    rgba(255,255,255,.1);

  border:
    1px solid rgba(255,255,255,.12);

  backdrop-filter:blur(10px);

  transition:.25s;
}

.category-btn.active{

  background:
    rgba(255,255,255,.22);

  box-shadow:
    0 0 18px rgba(255,255,255,.14);
}

.category-btn:hover{
  transform:translateY(-2px);
}

/* =========================================
   🎵 Grid
========================================= */

.grid{

  padding:18px;

  display:grid;

  grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));

  gap:18px;
}

/* =========================================
   🎵 Sound Card
========================================= */

.sound-btn{

  position:relative;

  overflow:hidden;

  border:none;

  min-height:160px;

  border-radius:26px;

  padding:18px;

  text-align:left;

  color:white;

  cursor:pointer;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.18),
      rgba(255,255,255,.08)
    );

  backdrop-filter:blur(18px);

  border:
    1px solid rgba(255,255,255,.14);

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    background .25s ease;

  box-shadow:
    0 12px 28px rgba(0,0,0,.22),
    inset 0 1px 1px rgba(255,255,255,.08);
}

/* 動態玻璃光 */

.sound-btn::before{

  content:"";

  position:absolute;

  top:0;
  left:-120%;

  width:80%;
  height:100%;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,.22),
      transparent
    );

  transition:.7s;
}

.sound-btn:hover::before{
  left:130%;
}

.sound-btn:hover{

  transform:
    translateY(-6px)
    scale(1.02);

  background:
    rgba(255,255,255,.18);

  box-shadow:
    0 18px 38px rgba(0,0,0,.28);
}

.sound-btn:active{
  transform:scale(.97);
}

/* 名稱 */

.sound-name{

  font-size:15px;
  font-weight:600;

  line-height:1.5;

  padding-right:40px;
}

/* 收藏 */

.favorite{

  position:absolute;

  top:14px;
  right:14px;

  width:34px;
  height:34px;

  border:none;

  border-radius:50%;

  color:white;

  cursor:pointer;

  background:
    rgba(255,255,255,.12);

  border:
    1px solid rgba(255,255,255,.12);

  transition:.25s;
}

.favorite:hover{
  transform:scale(1.1);
}

.favorite.active{

  background:
    rgba(255,80,120,.24);

  color:#ff7ca5;

  box-shadow:
    0 0 18px rgba(255,100,140,.3);
}

/* 波形 */

.wave{

  position:absolute;

  left:18px;
  bottom:18px;

  display:flex;
  align-items:flex-end;
  gap:4px;

  height:26px;
}

.wave span{

  width:5px;

  border-radius:999px;

  background:
    rgba(255,255,255,.85);

  animation:
    waveAnim 1s infinite ease-in-out;
}

.wave span:nth-child(2){
  animation-delay:.15s;
}

.wave span:nth-child(3){
  animation-delay:.3s;
}

.wave span:nth-child(4){
  animation-delay:.45s;
}

@keyframes waveAnim{

  0%,100%{
    height:6px;
    opacity:.5;
  }

  50%{
    height:24px;
    opacity:1;
  }
}

/* =========================================
   📱 手機版
========================================= */

@media(max-width:700px){

  .topbar{
    margin:10px;
    padding:14px;
    border-radius:22px;
  }

  .topbar h1{
    font-size:22px;
  }

  .title-icon{
    font-size:24px;
  }

  .social-bar{
    gap:10px;
  }

  .social-bar a{
    width:38px;
    height:38px;
  }

  .grid{

    padding:14px;

    grid-template-columns:
      repeat(2,1fr);

    gap:14px;
  }

  .sound-btn{

    min-height:140px;

    border-radius:20px;

    padding:16px;
  }

  .sound-name{
    font-size:13px;
  }

  .cursor-glow{
    display:none;
  }
}

</style>
</head>

<body>

<!-- ✨ 滑鼠光暈 -->
<div class="cursor-glow" id="cursorGlow"></div>

<!-- 🌌 背景 -->
<div class="bg-slideshow" id="slideshow"></div>

<!-- 🌑 遮罩 -->
<div class="bg-overlay"></div>

<!-- ✨ 粒子 -->
<div class="particles" id="particles"></div>

<!-- =========================================
     🎀 Header
========================================= -->

<header class="topbar">

  <div class="topbar-row">

    <h1>
      <span class="title-icon">🎧</span>
      Nyaru Soundboard
    </h1>

    <div class="social-bar">

      <a href="https://www.youtube.com/@Nyaru_NeSh1"
      target="_blank">
        <i class="fab fa-youtube"></i>
      </a>

      <a href="https://x.com/Nyaru_nesh1"
      target="_blank">
        <i class="fab fa-x-twitter"></i>
      </a>

      <a href="https://www.twitch.tv/nyaru_nesh1"
      target="_blank">
        <i class="fab fa-twitch"></i>
      </a>

    </div>

  </div>

  <!-- 搜尋 -->

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="搜尋音效..."
    >

  </div>

  <!-- 分類 -->

  <div class="category-bar">

    <button
      class="category-btn active"
      data-category="全部">
      全部
    </button>

    <button
      class="category-btn"
      data-category="迷因">
      迷因
    </button>

    <button
      class="category-btn"
      data-category="哄睡">
      哄睡
    </button>

    <button
      class="category-btn"
      data-category="可愛">
      可愛
    </button>

  </div>

</header>

<!-- =========================================
     🎵 音效區
========================================= -->

<main>
  <div id="soundGrid" class="grid"></div>
</main>

<script>

/* =========================================
   🌌 背景資料
========================================= */

const bgImages = [

  {
    url:"images/casnyaru.png",
    position:"center center"
  },

  {
    url:"images/WINK.png",
    position:"center top"
  },

  {
    url:"images/1.jpg",
    position:"center center"
  },

  {
    url:"images/2.png",
    position:"50% 20%"
  },

  {
    url:"images/oHo.jpg",
    position:"center top"
  }
];

/* =========================================
   🌌 建立背景
========================================= */

const slideshow =
document.getElementById("slideshow");

bgImages.forEach((img,index)=>{

  const div =
  document.createElement("div");

  div.className = "bg-slide";

  if(index === 0){
    div.classList.add("active");
  }

  div.style.backgroundImage =
  `url('${img.url}')`;

  div.style.backgroundPosition =
  img.position;

  slideshow.appendChild(div);
});

/* =========================================
   🎵 音效資料
========================================= */

const soundData = [

  {
    name:"歐買嘎都",
    file:"sounds/歐買嘎都.mp3",
    category:"迷因"
  },

  {
    name:"喝ㄋㄟㄋㄟ",
    file:"sounds/杯杯 - 喝ㄋㄟㄋㄟ.mp3",
    category:"可愛"
  },

  {
    name:"wake up 哄睡版",
    file:"sounds/wake up boy - 哄睡版本.mp3",
    category:"哄睡"
  }
];

/* =========================================
   🎵 Render
========================================= */

const grid =
document.getElementById("soundGrid");

const searchInput =
document.getElementById("searchInput");

const categoryBtns =
document.querySelectorAll(".category-btn");

let currentCategory = "全部";

function renderSounds(filter = ""){

  grid.innerHTML = "";

  const filtered =
  soundData.filter(sound => {

    const matchSearch =
    sound.name
    .toLowerCase()
    .includes(filter.toLowerCase());

    const matchCategory =
    currentCategory === "全部"
    || sound.category === currentCategory;

    return matchSearch && matchCategory;
  });

  filtered.forEach(sound=>{

    const btn =
    document.createElement("button");

    btn.className = "sound-btn";

    btn.innerHTML = `

      <button class="favorite">
        <i class="fa-solid fa-heart"></i>
      </button>

      <div class="sound-name">
        ${sound.name}
      </div>

      <div class="wave">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    `;

    /* 播放 */

    btn.addEventListener("click",(e)=>{

      if(
        e.target.closest(".favorite")
      ) return;

      const audio =
      new Audio(sound.file);

      audio.volume = 1;

      audio.play();
    });

    /* 收藏 */

    const fav =
    btn.querySelector(".favorite");

    fav.addEventListener("click",(e)=>{

      e.stopPropagation();

      fav.classList.toggle("active");
    });

    grid.appendChild(btn);
  });
}

renderSounds();

/* =========================================
   🔍 搜尋
========================================= */

searchInput.addEventListener(
  "input",
  e=>{
    renderSounds(e.target.value);
  }
);

/* =========================================
   📂 分類
========================================= */

categoryBtns.forEach(btn=>{

  btn.addEventListener("click",()=>{

    categoryBtns.forEach(b=>
      b.classList.remove("active")
    );

    btn.classList.add("active");

    currentCategory =
    btn.dataset.category;

    renderSounds(
      searchInput.value
    );
  });
});

/* =========================================
   🌌 背景切換
========================================= */

const slides =
document.querySelectorAll(".bg-slide");

let currentSlide = 0;

function changeSlide(){

  slides[currentSlide]
  .classList.remove("active");

  currentSlide =
  (currentSlide + 1)
  % slides.length;

  slides[currentSlide]
  .classList.add("active");

  const nextTime =
    Math.floor(
      Math.random() * 5000
    ) + 5000;

  setTimeout(changeSlide,nextTime);
}

setTimeout(changeSlide,6000);

/* =========================================
   ✨ 粒子
========================================= */

const particleContainer =
document.getElementById("particles");

for(let i = 0; i < 35; i++){

  const particle =
  document.createElement("div");

  particle.className = "particle";

  particle.style.left =
    Math.random() * 100 + "%";

  particle.style.animationDuration =
    (8 + Math.random() * 10) + "s";

  particle.style.animationDelay =
    Math.random() * 10 + "s";

  particle.style.opacity =
    Math.random();

  particle.style.width =
    particle.style.height =
    (4 + Math.random() * 8) + "px";

  particleContainer.appendChild(particle);
}

/* =========================================
   ✨ 滑鼠光暈
========================================= */

const glow =
document.getElementById("cursorGlow");

document.addEventListener(
  "mousemove",
  e=>{

    glow.style.left =
    e.clientX + "px";

    glow.style.top =
    e.clientY + "px";
  }
);

</script>

</body>
</html>
